[project]
name = "image-translation-exercise"
version = "0.0.0"
description = "DL@Janelia image translation (virtual staining) exercise — student environment"
# Python 3.12 chosen so we can pin torch 2.4.x (latest with cu121 wheels
# that work on driver 535, the version on the course AWS AMI).
requires-python = ">=3.12,<3.13"

# All dependencies for the exercise live here — pyproject.toml is the single
# source of truth. Bump the cytoland git ref below to upgrade VisCy.
#
# TODO(dl-janelia): once viscy/cytoland 0.5.0a* lands on PyPI, replace the
# cytoland git URL with `"cytoland[metrics]>=0.5.0a1"`. Once the course AWS
# AMI is upgraded to NVIDIA driver >=550, drop the torch pins and let
# viscy pick its preferred (newest cu124+) torch.
dependencies = [
    # Pin torch + torchvision to cu121-compatible builds. Required because:
    # 1. The course AWS AMI has NVIDIA driver 535 / CUDA 12.2. cu124 needs
    #    driver >=550, so we can't use newer torch wheels.
    # 2. viscy declares `torch>=2.10` (over-conservative — we override below).
    "torch==2.4.1",
    "torchvision==0.19.1",
    # transformers 5.x imports torch.distributed.tensor.device_mesh, which
    # only exists in torch 2.5+. viscy declares transformers>=4.40 (no upper
    # bound), so without this constraint uv resolves to 5.x and breaks
    # at import time. 4.x is fine with torch 2.4.
    "transformers<5",
    "cytoland[metrics] @ git+https://github.com/mehta-lab/VisCy.git@v0.5.0a1#subdirectory=applications/cytoland",
    "cellpose",
    "cmap",
    "torchview",
    "scikit-learn",
    "torchmetrics[detection]",
    "faster-coco-eval",
    "jupyter",
    "ipykernel",
    "ipywidgets",
    "jupytext",
    "nbformat",
    "nbconvert",
]

[tool.uv]
package = false

# Override viscy's torch>=2.10 floor and let transformers stay <5 alongside
# torch 2.4 (the actual API surface viscy uses works fine with both).
override-dependencies = [
    "torch==2.4.1",
    "torchvision==0.19.1",
    "transformers<5",
]

[tool.uv.sources]
# Pull torch/torchvision from PyTorch's CUDA 12.1 wheel index. cu121 wheels
# work on any driver >=525.60, including the AWS AMI's 535.
torch = [{ index = "pytorch-cu121" }]
torchvision = [{ index = "pytorch-cu121" }]

[[tool.uv.index]]
name = "pytorch-cu121"
url = "https://download.pytorch.org/whl/cu121"
explicit = true
